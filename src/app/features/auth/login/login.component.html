<section class="auth">
  <app-logo size="large"></app-logo>

  <article class=" auth-card">
    <header class="auth-header">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue planning and tracking your tasks.</p>
    </header>

    <form class="auth-form" (ngSubmit)="login()">
      <div class="auth-field">
        <label class="auth-label" for="login-email">Email</label>
        <input id="login-email" class="auth-input" type="email" name="email" autocomplete="email"
          placeholder="you@example.com" [(ngModel)]="email" [disabled]="isSubmitting" required />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="login-password">Password</label>
        <input id="login-password" class="auth-input" type="password" name="password" autocomplete="current-password"
          placeholder="Enter your password" [(ngModel)]="password" [disabled]="isSubmitting" required />
      </div>

      <button class="auth-btn" type="submit" [disabled]="!email.trim() || !password.trim() || isSubmitting">
        {{ isSubmitting ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

  </article>
  <p class="auth-footer">
    Don't have an account?
    <a routerLink="/register" class="auth-link">Create one</a>
  </p>
</section>
