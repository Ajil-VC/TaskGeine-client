<aside class="sidebar" [class.sidebar--open]="isOpen">
    <button class="sidebar-close-btn" type="button" (click)="closeSidebar.emit()">
        ✕
    </button>

    <div class="sidebar-top">
        <div class="sidebar-profile">
            <div class="sidebar-avatar" aria-hidden="true">AJ</div>
            <div class="sidebar-profile-text">
                <div class="sidebar-profile-name">Ajil</div>
                <div class="sidebar-profile-email">ajilexample.com</div>
            </div>
        </div>
    </div>

    <nav class="sidebar-nav">

        <a *ngFor="let item of menuItems" [routerLink]="item.route" routerLinkActive="sidebar-link--active"
            class="sidebar-link" (click)="closeSidebarAndHandlePageTitle()">
            <span class="sidebar-link-label">{{item.page.title}}</span>
        </a>

    </nav>
</aside>
